<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<title>SNAPFORGE</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			body {
				width: 100vw;
				height: 100vh;
				background: #000000;
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				color: white;
				font-family: system-ui, sans-serif;
				overflow: hidden;
			}

			.text {
				font-size: 28px;
				font-weight: bold;
				letter-spacing: 2px;
				opacity: 0;
				animation: textFadeIn 2.2s ease forwards;
			}

			/* 整体由暗到亮 */
			@keyframes textFadeIn {
				0% {
					opacity: 0;
				}
				100% {
					opacity: 1;
				}
			}

			/* 逐个字母依次出现 */
			.char {
				display: inline-block;
				opacity: 0;
				animation: charAppear 0.12s ease forwards;
			}
			@keyframes charAppear {
				from {
					opacity: 0;
					transform: translateY(6px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}
		</style>
	</head>
	<body>
		<div class="text" id="logoText">SNAPFORGE</div>

		<script>
			// 把文字拆成单个 span，实现逐个出现
			const el = document.getElementById("logoText");
			const text = el.textContent.trim(); //保留纯文本,去除空格
			el.innerHTML = ""; //清空元素内容
			// 4. 将文本按字符拆分成数组，并遍历每个字符
			text.split("").forEach((char, i) => {
				const span = document.createElement("span"); //创建一个span元素
				span.className = "char"; //设置类名
				span.textContent = char; //设置文本内容
				span.style.animationDelay = `${0.2 + i * 0.08}s`; //设置动画延迟
				el.appendChild(span); //将span元素添加到el元素中
			});
		</script>
	</body>
</html>
